<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Sound Meter (Home - Fix)</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #1a188a; color: white; margin: 0; padding: 20px; overflow: hidden; }
    
    /* ✅ Start Overlay: Forces user click to trigger permission prompt */
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #startBtn { padding: 25px 50px; font-size: 28px; font-weight: bold; background: #00ff80; color: black; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px #00ff80; transition: transform 0.2s; }
    #startBtn:active { transform: scale(0.95); }
    
    .status-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .pulse { width: 12px; height: 12px; background: #00ff80; border-radius: 50%; animation: blink 1.5s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    
    .stats { display: flex; justify-content: space-around; margin: 20px 0; }
    .stats span { display: block; font-size: 24px; font-weight: bold; color: cyan; }
    
    .meter-bar { width: 90%; height: 40px; margin: 20px auto; border: 3px solid #ccc; border-radius: 5px; background: linear-gradient(to right, limegreen, yellow, orange, orangered, red); position: relative; }
    .pointer { width: 4px; height: 50px; background: white; position: absolute; top: -5px; left: 0; transform: translateX(-50%); transition: left 0.1s; box-shadow: 0 0 10px white; }
    
    .circle { width: 220px; height: 220px; margin: 20px auto; border-radius: 50%; border: 8px solid cyan; display: flex; align-items: center; justify-content: center; background: black; flex-direction: column; }
    #dbValue { font-size: 40px; font-weight: bold; color: cyan; }
    
    .btn { display: block; width: 85%; max-width: 400px; margin: 15px auto; padding: 18px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-decoration: none; text-align: center; }
    .report-btn { background: #ffcc00; color: black; }
    .blue-btn { background: #3ba9ff; color: white; }
  </style>
</head>
<body>

  <div id="overlay">
    <h1 style="margin-bottom: 20px;">Sound Meter System</h1>
    <button id="startBtn">CLICK TO START</button>
    <p style="margin-top: 20px; color: #ccc;">Please click 'Allow' for Microphone Access</p>
  </div>

  <div class="status-container">
    <div class="pulse"></div>
    <div id="statusText">System Ready</div>
  </div>

  <a href="report.html" target="_blank" class="btn report-btn">📊 View Live Report (New Tab)</a>

  <div class="stats">
    <div>MIN <span id="minDb">0.0</span></div>
    <div>MAX <span id="maxDb">0.0</span></div>
    <div>AVG <span id="avgDb">0.0</span></div>
  </div>

  <div class="meter-bar">
    <div id="pointer" class="pointer"></div>
  </div>

  <div class="circle">
    <div id="dbValue">-- dB</div>
    <div id="warning" style="color: orange; font-size: 14px; margin-top: 5px;"></div>
  </div>

  <button class="btn blue-btn" onclick="window.open('personal.html', '_blank')">👤 Personal Info</button>

  <script>
    let audioContext, analyser, mic, javascriptNode;
    let minDb = Infinity, maxDb = -Infinity, windowBuf = [];
    const channel = new BroadcastChannel("dbChannel");
    let smoothDb = 0;

    // Triggered by the Big Start Button
    document.getElementById('startBtn').addEventListener('click', function() {
      document.getElementById('overlay').style.display = 'none';
      initAudio();
    });

    async function initAudio() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // Ensures the mic doesn't pause when switching tabs
        if (audioContext.state === 'suspended') { await audioContext.resume(); }

        analyser = audioContext.createAnalyser();
        mic = audioContext.createMediaStreamSource(stream);
        javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

        mic.connect(analyser);
        analyser.connect(javascriptNode);
        javascriptNode.connect(audioContext.destination);

        javascriptNode.onaudioprocess = function() {
          const buffer = new Float32Array(analyser.fftSize);
          analyser.getFloatTimeDomainData(buffer);
          let sum = 0;
          for (let i = 0; i < buffer.length; i++) sum += buffer[i] * buffer[i];
          let db = 20 * Math.log10(Math.sqrt(sum / buffer.length)) + 100;
          
          if (!isFinite(db) || isNaN(db)) db = 0;
          smoothDb = smoothDb + 0.12 * (db - smoothDb);

          // UI Updates
          document.getElementById("pointer").style.left = (Math.min(120, Math.max(0, smoothDb)) / 120) * 100 + "%";
          document.getElementById("dbValue").innerText = smoothDb.toFixed(1) + " dB";
          document.getElementById("statusText").innerText = "Recording in Background...";

          // Statistics logic
          if (smoothDb < minDb) minDb = smoothDb;
          if (smoothDb > maxDb) maxDb = smoothDb;
          windowBuf.push(smoothDb); if(windowBuf.length > 60) windowBuf.shift();
          const avg = (windowBuf.reduce((a,b)=>a+b,0) / windowBuf.length).toFixed(1);

          document.getElementById("minDb").innerText = minDb.toFixed(1);
          document.getElementById("maxDb").innerText = maxDb.toFixed(1);
          document.getElementById("avgDb").innerText = avg;

          // Continuous Broadcast to Report Page
          channel.postMessage({
            min: minDb.toFixed(1), max: maxDb.toFixed(1), avg: avg,
            db: smoothDb.toFixed(1), time: Date.now()
          });
        };
      } catch (err) {
        alert("Microphone Error: " + err);
        location.reload(); // Retry if denied
      }
    }

    // Secondary fix for "Background Sleep": Resumes audio if you click anywhere
    window.addEventListener('mousedown', () => {
      if (audioContext && audioContext.state === 'suspended') { audioContext.resume(); }
    });
  </script>
</body>
</html>
